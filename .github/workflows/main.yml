name: Deploy Codebase Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Execute Pipeline Production Check
        run: |
          echo "🚀 Starting automated deployment pipeline..."
          echo "📅 Trigger Event: ${{ github.event_name }}"
          echo "✅ Repository files verified successfully."

      # NEW: Directly publishes your index.html to your Cloudflare Workers/Pages site
      - name: Deploy to Cloudflare Workers KV/Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=web # Adjust if using a specific project/worker name

      - name: Send Telegram Alert Notification
        if: always() # Ensures you get a message even if the deployment fails!
        run: |
          MESSAGE="🔔 *GitHub Action Alert* 🔔%0A%0A*Repo:* ${{ github.repository }}%0A*Event:* \`${{ github.event_name }}\`%0A*Status:* ${{ job.status == 'success' && '✅ Success' || '❌ Failed' }}%0A%0A🌐 *Live URL:* https://web.tbmsaranga.workers.dev/"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="$MESSAGE"
